name: Ren'Py CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Ren'Py SDK
        id: cache-renpy
        uses: actions/cache@v4
        with:
          path: renpy
          key: ${{ runner.os }}-renpy-${{ hashFiles('**/.renpy-version') || 'default' }}

      - name: Setup Ren'Py
        uses: Ayowel/renpy-setup-action@v2.0.1
        if: steps.cache-renpy.outputs.cache-hit != 'true'
        with:
          action: install
          install_dir: renpy

      - name: Run Ren'Py Lint
        uses: Ayowel/renpy-setup-action@v2.0.1
        with:
          action: exec
          install_dir: renpy
          run: lint "${{ github.workspace }}"

      - name: Compile check (optional)
        uses: Ayowel/renpy-setup-action@v2.0.1
        with:
          action: exec
          install_dir: renpy
          run: compile "${{ github.workspace }}"

