name: Ren'Py CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Ren'Py
        id: cache-renpy
        uses: actions/cache@v4
        with:
          path: renpy
          key: ${{ runner.os }}-renpy-${{ hashFiles('**/.renpy-version') || '8.3' }}

      - name: Setup Ren'Py
        uses: Ayowel/renpy-setup-action@v2.0.1
        if: steps.cache-renpy.outputs.cache-hit != 'true'
        with:
          action: install
          install_dir: renpy

      - name: Run Ren'Py Lint (disable global testcase)
        uses: Ayowel/renpy-setup-action@v2.0.1
        with:
          action: exec
          install_dir: renpy
          run: lint . --config "config.testcases=False"