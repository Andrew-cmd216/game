name: Ren'Py CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'        # Ren'Py 8 использует Python 3.9+

      - name: Install Ren'Py dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Check Ren'Py syntax (lint)
        run: |
          # Скачиваем Ren'Py headless (без графики) для CI
          curl -L -o renpy.tar.bz2 https://www.renpy.org/dl/8.3.6/renpy-8.3.6-sdk.tar.bz2
          tar -xjf renpy.tar.bz2
          mv renpy-8.3.6-sdk renpy

          # Запускаем lint через Ren'Py
          ./renpy/renpy.sh . lint --error-on-any

      - name: Check for common errors
        run: |
          echo "Проверка завершена. Если lint прошёл — проект синтаксически корректен."