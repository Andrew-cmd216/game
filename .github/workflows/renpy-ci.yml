name: Ren'Py CI (Lint)

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  renpy-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Ren'Py SDK
        id: cache-renpy
        uses: actions/cache@v4
        with:
          path: renpy
          key: renpy-sdk-8.3.6-${{ runner.os }}

      - name: Download Ren'Py SDK
        if: steps.cache-renpy.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Ren'Py 8.3.6 SDK..."
          curl -L -o renpy.tar.bz2 https://www.renpy.org/dl/8.3.6/renpy-8.3.6-sdk.tar.bz2
          tar -xjf renpy.tar.bz2
          mv renpy-8.3.6-sdk renpy
          chmod +x renpy/renpy.sh

      - name: Clean old compiled files
        run: |
          echo "🧹 Cleaning old .rpyc files..."
          find . -name "*.rpyc" -delete 2>/dev/null || true
          find . -name "*.rpymc" -delete 2>/dev/null || true
          rm -rf __pycache__ game/__pycache__ 2>/dev/null || true

      - name: Show project structure (для отладки)
        run: |
          echo "Current directory: $(pwd)"
          echo "Contents of root:"
          ls -la
          echo "Contents of game/ (if exists):"
          ls -la game/ 2>/dev/null || echo "Папка game/ не найдена!"

      - name: Run Ren'Py Lint
        run: |
          echo "🚀 Running Ren'Py Lint..."
          
          # Самый надёжный вариант: указываем полный путь к папке проекта
          ./renpy/renpy.sh . lint --error-on-any