name: Ren'Py CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  renpy-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache Ren'Py SDK
        id: cache-renpy
        uses: actions/cache@v4
        with:
          path: renpy
          key: renpy-sdk-8.3.6-${{ runner.os }}

      - name: Download Ren'Py SDK
        if: steps.cache-renpy.outputs.cache-hit != 'true'
        run: |
          echo "Downloading Ren'Py 8.3.6 SDK..."
          curl -L -o renpy.tar.bz2 https://www.renpy.org/dl/8.3.6/renpy-8.3.6-sdk.tar.bz2
          tar -xjf renpy.tar.bz2
          mv renpy-8.3.6-sdk renpy
          chmod +x renpy/renpy.sh

      - name: Clean old compiled files
        run: |
          echo "Cleaning old .rpyc and .rpymc files..."
          find game -name "*.rpyc" -delete 2>/dev/null || true
          find game -name "*.rpymc" -delete 2>/dev/null || true
          rm -rf game/__pycache__ 2>/dev/null || true

      - name: Run Ren'Py Lint
        run: |
          echo "Running Ren'Py Lint..."
          ./renpy/renpy.sh game lint --error-on-any

      - name: Success message
        if: success()
        run: |
          echo "✅ Ren'Py Lint passed successfully!"
          echo "Все скрипты проверены, ошибок не найдено."